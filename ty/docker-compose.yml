services:
  watchdog:
    build:
      context: .
      dockerfile_inline: |
        FROM node:20-slim
        WORKDIR /app
        COPY package.json .
        RUN npm install
        COPY watchdog.js .
        CMD ["node", "watchdog.js"]
    container_name: jamsend-watchdog
    restart: always
    network_mode: host
    volumes:
      # Mount the whole directory so Docker doesn't turn the socket path into a dir
      - /tmp/jamsend-supervisor:/tmp/jamsend-supervisor
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
    env_file: jamsend-supervisor.conf
