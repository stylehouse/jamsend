services:
  watchdog:
    build: .
    container_name: jamsend-watchdog
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /tmp/chrome_launcher.sock:/tmp/chrome_launcher.sock
    logging:
      driver: "json-file"
      options:
        max-size: "10m"