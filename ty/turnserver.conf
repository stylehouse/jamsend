# coturn config

# Listen on standard STUN/TURN ports
listening-port=3478
tls-listening-port=5349
cert=/etc/ssl/coturn.crt
pkey=/etc/ssl/coturn.key

# these get autodetected by ty/coturn-entrypoint.sh
relay-ip=192.168.1.11
external-ip=

# STUN and TURN
listening-ip=0.0.0.0

# Realm for authentication
realm=jamsend.duckdns.org

# Simple static user authentication (change these!)
user=jamsend:Eiru7gahneeD2che

# Logging
verbose
# GONE: use docker logs (stdout|stderr)
# log-file=/var/log/turnserver.log

# Security
fingerprint
lt-cred-mech

# Relay configuration
# apparently these must all be forwarded! see upnp-loop.sh
min-port=49152
max-port=65535
# this is quick since we have so few ports
max-allocate-timeout=300

# this is very quick since we have so few ports
#  my router only allows 32 upnp forwardings
# max-allocate-timeout=33

# Deny private IP ranges from being relayed
no-multicast-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255


# Performance
no-cli


