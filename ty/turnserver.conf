# coturn config

# Listen on standard STUN/TURN ports
listening-port=3478
tls-listening-port=5349
cert=/etc/ssl/coturn.crt
pkey=/etc/ssl/coturn.key

# these get autodetected by ty/coturn-entrypoint.sh
relay-ip=192.168.1.11
external-ip=

# STUN and TURN
listening-ip=0.0.0.0

# Realm for authentication
realm=jamsend.duckdns.org

# Simple static user authentication (change these!)
user=jamsend:Eiru7gahneeD2che

# Logging
verbose
# GONE: use docker logs (stdout|stderr)
# log-file=/var/log/turnserver.log

# Security
fingerprint
lt-cred-mech

# Relay configuration
min-port=49152
max-port=65535
# this is quick since we have so few ports
max-allocate-timeout=300
# this is very quick since we have so few ports
#  my router only allows 32 upnp forwardings, not sure if effective. see upnp-loop.sh
# max-allocate-timeout=33

# Deny some IP ranges from being relayed
#  without them coturn becomes an open proxy into your private network
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255   # cloud metadata
denied-peer-ip=100.64.0.0-100.127.255.255    # carrier-grade NAT
# these ranges are much less dangerous on a cloud VPS with no LAN behind it — the worst you'd reach is other containers
# the 192.168/16 is where we test from
# denied-peer-ip=10.0.0.0-10.255.255.255
# denied-peer-ip=172.16.0.0-172.31.255.255
# denied-peer-ip=192.168.0.0-192.168.255.255


# Performance
no-cli


