# docker-compose.yml — the DEV instance: the app/runner on :9091 (+ the `claude` CLI container).
#
# PAIRED WITH staging/docker-compose.yml — the EDITOR/staging instance on :9092 (the Editron IDE, a
#  separate git worktree). The two are bridged at runtime by the relay's r2r link (the runner dials
#   ws://172.17.0.1:9092/relay), so editor↔runner frames cross between them. CLUSTER TRUST spans the
#    pair: the secret Idento flock is minted by the editor (🪪 Set up cluster trust) — this side holds
#     `.env.cluster-pubs` (public, for the relay's gen_write verify + the VITE bake) and `.env.cluster-claude`
#      (the CLI's signing key, masked from `app`); the editor side holds pubs too. Edit one of the pair and
#       check the other still lines up (ports, relay bridge, cluster env). See that file's header.

x-common-volumes: &common-volumes
  music-volume: &music-volume "${MUSIC_PATH:-/home/s/Music/71mix/}:/music:ro"


services:
  app:
    build:
      context: .
      dockerfile_inline: |
        FROM alpine:3.19
        WORKDIR /app
        RUN apk add --no-cache \
            nodejs \
            npm
        COPY package*.json ./
        RUN npm install
        COPY . .
    container_name: jamsend-dev
    working_dir: /app
    volumes:
      - .:/app
      # - "./testsounds:/music:ro"
      - *music-volume
      # The broad .:/app would let the dev server READ other roles' secret files off disk. It only
      #  needs the PUBLIC pubs (env_file'd above), so mask the co-located claude secret with a blank
      #   file (same pattern as the .env.chrome-profiles masks on the claude service). Foreign role
      #    files (editor/runner) belong on their own hosts and should not sit in this /app at all.
      - ./.claude/.blank:/app/.env.cluster-claude:ro
    ports:
      # a bare "9091:9091" binds ALL interfaces (LAN-exposed) — avoid.  Publish to
      #  two explicit addresses instead:
      # - "9091:9091"
      # 127.0.0.1 — reachable as http://localhost:9091 on the host: WebRTC needs a
      #  secure context and localhost counts; it's also where a browser opens the editor
      #   and where the relay endpoint lives.  Not LAN-exposed.
      - "127.0.0.1:9091:9091"
      # 172.17.0.1 — the docker bridge gateway, so a sibling container (the staging
      #  runner) can reach this editor's relay at ws://172.17.0.1:9091/relay over the bridge.
      - "172.17.0.1:9091:9091"
    command: npm run dev -- --host 0.0.0.0 --port 9091
    # Vite reads ALLOWED_HOSTS (public-host allowlist) from here — see .env.example.
    #  .env.local is gitignored; it must exist (cp .env.example .env.local) or `up` errors.
    env_file:
      - .env.local
      # Cluster trust — PUBLIC pubs ONLY (no private key): the relay verifies gen_write against these
      #  and vite.config bakes them into VITE_CLUSTER_TRUSTED_PUBS for the browser. required:false so an
      #   un-minted cluster doesn't break `up` (relay warn-and-allows). The editor browser's OWN signing
      #    key comes from localStorage, never from here. (minted by the editor's 🪪 Set up cluster trust.)
      - path: .env.cluster-pubs
        required: false
    tty: true
    stdin_open: true
    restart: 'always'

    # Cap the dev log so a chatty Vite/HMR run can't fill the disk.  Docker's
    #  json-file driver bounds by SIZE, not line count: ~5MB per file, 2 files
    #  kept (≈10MB rolling).  Takes effect on container recreate (up -d), not a
    #  plain restart.  For a quick view limit instead: docker compose logs --tail 5000 app
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"


    # Resource limits to prevent runaway processes
    deploy:
      resources:
        limits:
          cpus: '2.0'          # Max 2 CPU cores
          memory: 2G           # Max 1GB RAM
        reservations:
          cpus: '0.5'          # Reserve 0.5 CPU cores  
          memory: 256M         # Reserve 256MB RAM
    # Process limits
    ulimits:
      nproc: 100               # Max 100 processes total
      nofile: 1024             # Max 1024 open files


  # Claude Code session.  Bind-mounts the same working tree as app, so its
  #  edits land straight on the host where you review them.
  #  Reach the running app over the compose network at http://app:9091.
  claude:
    build:
      context: .
      dockerfile_inline: |
        FROM node:22-bookworm-slim
        RUN apt-get update \
            && apt-get install -y --no-install-recommends git ca-certificates less \
            && rm -rf /var/lib/apt/lists/*
        RUN npm install -g @anthropic-ai/claude-code
        # the named auth volume mounts onto this dir at runtime.
        #  an empty named volume inherits the dir's ownership from the image,
        #   so the dir must exist owned by node before the volume attaches,
        #    else node cannot write its credentials there.
        RUN mkdir -p /home/node/.claude && chown -R node:node /home/node/.claude
    container_name: jamsend-claude
    working_dir: /app
    user: "1000:1000" # is uid 1000, so files it writes are yours on the host
    volumes:
      - .:/app
      - *music-volume
      - claude-auth:/home/node/.claude
      # Mask the two secret env files with an empty file. The broad .:/app would
      #  otherwise expose them; the more specific mount wins, so claude reads
      #   them as empty. The host files are untouched; the app container,
      #    which carries no such overlay, still reads the real values.
      #  A regular empty file is used, not /dev/null: a char-device source makes
      #   runc create the target as a directory, which then cannot take the mount.
      #   Create the blank once with: touch .blank   (it is safe to commit).
      #  To hide all of ty/ instead, replace these two with: - /app/ty
      - ./.claude/.blank:/app/ty/.env.chrome-profiles:ro
      - ./.claude/.blank:/app/ty/droidlounge/.env.chrome-profiles:ro
    environment:
      - CLAUDE_CONFIG_DIR=/home/node/.claude
    env_file:
      # Cluster trust — claude's OWN role secret (CLUSTER_IDENTO_CLAUDE_KEY/_PUB), so the CLI can sign
      #  this_dock_updated / gen_write. Not other roles' keys.
      - path: .env.cluster-claude
        required: false
      # PUBLIC pubs file — carries EDITOR_URL (where ghost-update notifies + verifies the editor) and
      #  the trusted pubs. No secret. required:false so an un-minted cluster doesn't break `up`.
      - path: .env.cluster-pubs
        required: false
    tty: true
    stdin_open: true
    # tini as PID 1 (Docker injects its own docker-init; the slim image ships no
    #  init). Without it, sleep infinity is PID 1 and never reaps: orphaned esbuild
    #   children re-parent to it and pile up as zombies until they exhaust the pids
    #    cap below, at which point the next fork hits EAGAIN and the claude TUI dies.
    init: true
    command: sleep infinity     # stays up; you attach a session with docker compose exec
    restart: 'unless-stopped'
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G            # roomier than app, since claude spawns rg, node, subagents (+ svelte-check, ~1.5–2G heap, OOM'd at 2G)
          # cap processes per container via cgroup, the limit we actually want.
          #  nproc is avoided on purpose: it is a per-UID limit counted across
          #   the whole host, so since this runs as node (uid 1000, your own
          #    busy uid) a small nproc starves exec with EAGAIN
          #     "resource temporarily unavailable".
          pids: 512
        reservations:
          cpus: '0.5'
          memory: 512M
    ulimits:
      nofile: 4096


