# staging/docker-compose.yml — a second, localhost-only app instance, isolated from the
#  dev container's HMR/build so running an IDE here can't disturb dev (and vice-versa).
#  It's "staging" only in that it's a more stable place to keep a tab open than dev.
#
# How you use it: open  http://localhost:9092/Otro?B=Editron  — the app lives at the
#  /Otro route (/ is the p2p Intro page).  The ?B URL param (parsed in Otro) tells the default
#  Auto to activate the Editron Story Book — a full Lies/Lang IDE that comes up as a one-step
#  "watch itself start up" Story, then is used live; the companion ?W=<Waft> picks the Waft it
#  opens on.  Plain http://localhost:9092/Otro still boots Auto's Library as normal.  No
#  build/env flag needed — the param picks the Book per-tab.
#
# Isolation = a separate git worktree.  The worktree is its own checkout with its own
#  node_modules / .vite / .svelte-kit, so two SvelteKit dev servers never share a build
#  cache.  Set it up once on the host:
#
#     git worktree add ../jamsend-staging        # a sibling checkout (own working files)
#     cd ../jamsend-staging && npm install        # its OWN node_modules (isolated .vite cache)
#     docker compose -f staging/docker-compose.yml up
#
# Relative paths below resolve against THIS file's dir (staging/), so `..` is the worktree
#  root — run it from anywhere.  No proxy / DuckDNS / tunnel: bound to 127.0.0.1 only.
#  No WebRTC, no /music mount: this instance reaches the dev repo's content at runtime via
#   Wormhole + the Directory API (the browser picks the dev repo dir), not a bind mount.
#  No env_file: ALLOWED_HOSTS stays empty → vite serves localhost only (the secure default).

services:
  staging:
    build:
      context: ..
      dockerfile_inline: |
        FROM alpine:3.19
        WORKDIR /app
        RUN apk add --no-cache nodejs npm
        COPY package*.json ./
        RUN npm install
        COPY . .
    container_name: jamsend-staging
    working_dir: /app
    user: "1000:1000"            # uid 1000 — files it writes are yours on the host
    volumes:
      # The worktree root (this file lives in staging/).  node_modules lives HERE, in the
      #  worktree — copy the dev checkout's alpine-built deps in instead of a second install:
      #    cp -a ../jamsend/node_modules .          # run from the worktree root, as your uid
      #  Owned by your uid (1000) so the uid-1000 container can write node_modules/.vite, and
      #   fully isolated (its own .vite / .svelte-kit) — no shared-volume permission trap.
      - ..:/app
      - ./node_modules:/app/node_modules
    ports:
      - "127.0.0.1:9092:9092"    # localhost only — no LAN, no proxy
      - "172.17.0.1:9092:9092"
    command: npm run dev -- --host 0.0.0.0 --port 9092
    # No boot env var: which Book loads is chosen per-tab by the ?B URL param
    #  (default Auto's Library; ?B=Editron = the IDE Book).  See the header note.
    tty: true
    stdin_open: true
    restart: 'unless-stopped'
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
          # Cap processes per CONTAINER via cgroup, NOT per-UID.  This service runs as
          #  uid 1000 (your own busy host uid), and ulimits.nproc is a per-UID limit
          #   counted across the WHOLE host — so a small nproc here starves npm's exec
          #    with EAGAIN ("exec /usr/bin/npm: resource temporarily unavailable") because
          #     uid 1000 already has plenty of processes hostwide.  (The dev `app` only
          #      dodges this by running as root, which is exempt from RLIMIT_NPROC.)
          #       pids is the limit we actually want — same fix as the `claude` service.
          pids: 512
        reservations:
          cpus: '0.5'
          memory: 256M
    ulimits:
      nofile: 1024
