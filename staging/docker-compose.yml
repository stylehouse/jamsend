# staging/docker-compose.yml — a second, localhost-only app instance: the EDITOR half on :9092,
#  a live dev server with full HMR in its own right (you edit and build the IDE here too).  It's
#   "staging" only in that it's a calmer place to keep an editor tab open than the dev/runner side;
#    the two run side by side, each HMR-ing independently (see "separate build caches" below).
#
# PAIRED WITH ../docker-compose.yml — the DEV instance: the app/runner on :9091 (+ the `claude` CLI).
#  This is the EDITOR half on :9092. The two are bridged at runtime by the relay's r2r link (the runner
#   dials this server's ws://172.17.0.1:9092/relay), so editor↔runner frames cross between them. CLUSTER
#    TRUST spans the pair: the secret Idento flock is split per role (scripts/gen-cluster-identos.ts); this
#     editor side env_files the PUBLIC `../.env.cluster-pubs` below so its relay can verify gen_write and
#      vite can bake VITE_CLUSTER_TRUSTED_PUBS for the browser. No private key lives here (the editor browser
#       signs with its localStorage cluster Idento). Edit one of the pair and check the other still lines up.
#
# How you use it: open  http://localhost:9092/Otro?E=Editron&W=Ghost/Net/Easy  — the app lives at
#  the /Otro route (/ is the p2p Intro page).  The ?E URL param (parsed in Otro) boots this instance
#   as the EDITOR of the named Story Book — here Editron, a full Lies/Lang IDE that comes up as a
#    one-step "watch itself start up" Story, then is used live (?B=<Book> is the runner counterpart,
#     used by the dev side).  The companion &W=<Waft> picks the Waft it opens on: Ghost/Net/Easy here
#      resolves under wormhole/ to wormhole/Ghost/Net/Easy, a Waft annotating a ghost.  Plain
#       http://localhost:9092/Otro still boots Auto's Library as normal.  No build/env flag needed —
#        the params pick role + Book + Waft per-tab.
#
# Separate build caches — the one thing two dev servers must NOT share.  SvelteKit/Vite
#  constantly regenerate .svelte-kit (generated/root.svelte, tsconfig) and node_modules/.vite;
#   if both servers write one shared copy, each sees the other's rewrite as a change and
#    FULL-reloads instead of HMR-ing.  The volume overlays below give staging its OWN
#     node_modules and .svelte-kit, so both servers keep clean HMR.  Two ways to run it:
#
#   • Same checkout (simplest, while building both halves together) — `..:/app` shares THIS
#      repo as the source; the overlays isolate only the caches.  Seed them uid-1000-owned once
#      (Docker makes a missing bind source root-owned, which the uid-1000 container can't write):
#        mkdir -p staging/node_modules staging/.svelte-kit
#        chown 1000:1000 staging/node_modules staging/.svelte-kit
#        cp -a node_modules/. staging/node_modules/   # this checkout's deps; or `npm install` in staging/
#
#   • Separate worktree (when you also want isolated WORKING FILES) — `..` becomes the worktree
#      root, already carrying its own node_modules/.svelte-kit; the overlays just nest those under
#      staging/ instead, which is harmless:
#        git worktree add ../jamsend-staging && cd ../jamsend-staging && npm install
#        docker compose -f staging/docker-compose.yml up
#
# Relative paths below resolve against THIS file's dir (staging/).  No proxy / DuckDNS / tunnel:
#  bound to 127.0.0.1 only.  No WebRTC, no /music mount: this instance reaches the dev repo's
#   content at runtime via Wormhole + the Directory API (the browser picks the dev repo dir), not
#    a bind mount.  The only env_file is the PUBLIC cluster pubs (below) — it sets
#     CLUSTER_TRUSTED_PUBS, NOT ALLOWED_HOSTS, so ALLOWED_HOSTS stays empty → vite serves
#      localhost only (the secure default).

services:
  staging:
    build:
      context: ..
      dockerfile_inline: |
        FROM alpine:3.19
        WORKDIR /app
        RUN apk add --no-cache nodejs npm
        COPY package*.json ./
        RUN npm install
        COPY . .
    container_name: jamsend-staging
    working_dir: /app
    user: "1000:1000"            # uid 1000 — files it writes are yours on the host
    volumes:
      # `..` = the source (this checkout, or the worktree root).  The two overlays give staging
      #  its OWN build caches so its HMR doesn't fight dev's — see "separate build caches" up top
      #   for why, and the one-time uid-1000 seeding of the staging/ source dirs.
      - ..:/app
      - ./node_modules:/app/node_modules           # own deps + .vite cache (.vite lives inside node_modules)
      - ./.svelte-kit:/app/.svelte-kit             # own generated route tree (root.svelte, tsconfig)
    ports:
      - "127.0.0.1:9092:9092"    # localhost only — no LAN, no proxy
      - "172.17.0.1:9092:9092"
    command: npm run dev -- --host 0.0.0.0 --port 9092
    env_file:
      # Cluster trust — PUBLIC pubs ONLY (paired with the dev compose; see header). The editor relay
      #  verifies gen_write against these and vite bakes VITE_CLUSTER_TRUSTED_PUBS for the browser. The
      #   editor's OWN signing key is in its browser localStorage, never here. `..` = the worktree root,
      #    where you place the pubs file. required:false so an un-minted cluster doesn't break `up`.
      - path: ../.env.cluster-pubs
        required: false
    # No boot env var: which Book loads is chosen per-tab by the ?B URL param
    #  (default Auto's Library; ?B=Editron = the IDE Book).  See the header note.
    tty: true
    stdin_open: true
    restart: 'unless-stopped'
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
          # Cap processes per CONTAINER via cgroup, NOT per-UID.  This service runs as
          #  uid 1000 (your own busy host uid), and ulimits.nproc is a per-UID limit
          #   counted across the WHOLE host — so a small nproc here starves npm's exec
          #    with EAGAIN ("exec /usr/bin/npm: resource temporarily unavailable") because
          #     uid 1000 already has plenty of processes hostwide.  (The dev `app` only
          #      dodges this by running as root, which is exempt from RLIMIT_NPROC.)
          #       pids is the limit we actually want — same fix as the `claude` service.
          pids: 512
        reservations:
          cpus: '0.5'
          memory: 256M
    ulimits:
      nofile: 1024
